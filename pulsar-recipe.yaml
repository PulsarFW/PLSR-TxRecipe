$engine: 3
$onesync: on
name: Pulsar Framework
version: 1.0.0
author: Pulsar Framework
description: One-click txAdmin recipe to deploy Pulsar Framework.

tasks:
  # Download base config files from companion repo
  - action: download_github
    src: https://github.com/PulsarFW/PLSR-TxRecipe
    ref: main
    dest: ./tmp/pulsar-recipe

  - action: move_path
    src: ./tmp/pulsar-recipe/server.cfg
    dest: ./server.cfg

  - action: replace_string
    mode: all_vars
    file: ./server.cfg

  - action: move_path
    src: ./tmp/pulsar-recipe/configs
    dest: ./configs

  - action: move_path
    src: ./tmp/pulsar-recipe/logo96.png
    dest: ./logo96.png

  # Prepare Database
  - action: connect_database
  - action: query_database
    file: ./tmp/pulsar-recipe/pulsar.sql

  # Defaults/Dependencies
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]

  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/PulsarFW/oxmysql/releases/latest/download/oxmysql.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/oxmysql.zip

  - action: download_file
    path: ./tmp/ox_lib.zip
    url: https://github.com/PulsarFW/ox_lib/releases/latest/download/ox_lib.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_lib.zip

  - action: download_file
    path: ./tmp/ox_target.zip
    url: https://github.com/PulsarFW/ox_target/releases/latest/download/ox_target.zip
